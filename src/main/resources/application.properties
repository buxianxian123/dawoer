spring.application.name=dawoer

# --- datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/dawoer?prepareThreshold=0
spring.datasource.username=dawoer
spring.datasource.password=dawoer
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- MinIO ---
minio.endpoint=http://localhost:9000
minio.access-key=minio
minio.secret-key=minio123
minio.bucket=media

# --- 文件上传配置 ---
# 单个文件最大大小：500MB（适合视频文件）
spring.servlet.multipart.max-file-size=500MB
# 总请求大小：500MB
spring.servlet.multipart.max-request-size=500MB
# 文件写入磁盘的阈值（超过此大小会写入临时文件）
spring.servlet.multipart.file-size-threshold=10MB
